name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (nvim ${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (${{ matrix.nvim }})
        run: |
          set -e
          VERSION="${{ matrix.nvim }}"
          DEST="$HOME/nvim-$VERSION"
          BIN="$HOME/.local/bin"
          mkdir -p "$BIN"

          # Resolve "stable" / "nightly" to a download URL
          if [ "$VERSION" = "nightly" ]; then
            URL="https://github.com/neovim/neovim/releases/download/nightly/nvim-linux-x86_64.tar.gz"
          else
            # Resolve "stable" tag to the concrete release URL
            URL="https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz"
          fi

          # Download with up to 5 retries
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: downloading $URL"
            if curl -fL --retry 3 --retry-delay 10 -o /tmp/nvim.tar.gz "$URL"; then
              break
            fi
            echo "Download failed, waiting 30s before retry..."
            sleep 30
          done

          tar -xzf /tmp/nvim.tar.gz -C "$HOME"
          # Tarball extracts to nvim-linux-x86_64/
          ln -sf "$HOME/nvim-linux-x86_64/bin/nvim" "$BIN/nvim"
          echo "$BIN" >> "$GITHUB_PATH"
          nvim --version

      - name: Install LuaRocks
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks

      - name: Install test dependencies (busted + nlua for Lua 5.1)
        run: |
          luarocks --lua-version 5.1 --local install busted
          luarocks --lua-version 5.1 --local install nlua
          echo "$HOME/.luarocks/bin" >> "$GITHUB_PATH"

      - name: Cache nui.nvim dep
        uses: actions/cache@v4
        with:
          path: deps/
          key: deps-nui-${{ hashFiles('tests/busted_helper.lua') }}

      - name: Run tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: make lint

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ tests/ scripts/
