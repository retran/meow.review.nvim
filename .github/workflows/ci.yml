name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (nvim ${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim:
          - stable
          - nightly

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (${{ matrix.nvim }})
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Install LuaRocks
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks

      - name: Install test dependencies (busted + nlua for Lua 5.1)
        run: luarocks --lua-version 5.1 install busted && luarocks --lua-version 5.1 install nlua

      - name: Cache nui.nvim dep
        uses: actions/cache@v4
        with:
          path: deps/
          key: deps-nui-${{ hashFiles('tests/busted_helper.lua') }}

      - name: Run tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: make lint

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ tests/ scripts/
